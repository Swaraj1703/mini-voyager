version: 2

models:
  - name: stg_customers
    description: "One row per customer, lightly cleaned from raw."
    columns:
      - name: customer_sk
        description: "Surrogate key (MD5 of customer_id)."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural key from source."
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: stg_orders
    description: "One row per order placed."
    columns:
      - name: order_sk
        description: "Surrogate key (MD5 of order_id)."
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_sk
        description: "FK to stg_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_sk
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['completed', 'pending', 'cancelled']

  - name: stg_order_items
    description: "One row per order line item."
    columns:
      - name: order_item_sk
        description: "Surrogate key (MD5 of order_item_id)."
        tests:
          - unique
          - not_null
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_sk
        description: "FK to stg_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_sk
      - name: quantity
        tests:
          - not_null